# Helm values snippet for actions-runner-controller gha-runner-scale-set.
# Use this with ARC containerMode.type: dind.
#
# The runner container receives the GitHub job hook and the cicd-sensor GitHub
# Kubernetes runner socket. The agent uses the hook peer cgroup and same-Pod
# sibling cgroups to bind the runner and dind sidecar to the job.

containerMode:
  type: dind

template:
  spec:
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command:
          - /home/runner/run.sh
        env:
          - name: ACTIONS_RUNNER_HOOK_JOB_STARTED
            value: /opt/cicd-sensor/job-hooks/github-k8s-job-started.js
          - name: CICD_SENSOR_GITHUB_K8S_RUNNER_SOCKET
            value: /run/cicd-sensor/github-k8s/runner.sock
        volumeMounts:
          - name: cicd-sensor-github-arc-job-hook
            mountPath: /opt/cicd-sensor/job-hooks
            readOnly: true
          - name: cicd-sensor-github-k8s-runner-socket
            mountPath: /run/cicd-sensor/github-k8s
    volumes:
      - name: cicd-sensor-github-arc-job-hook
        configMap:
          name: cicd-sensor-github-arc-job-hook
          defaultMode: 0555
      - name: cicd-sensor-github-k8s-runner-socket
        hostPath:
          path: /run/cicd-sensor/github-k8s
          type: DirectoryOrCreate
