# Helm values snippet for actions-runner-controller gha-runner-scale-set.
# Use this with ARC containerMode.type: kubernetes.
#
# The runner container receives:
# - the GitHub job hook and GitHub Kubernetes runner socket, required for all ARC
#   modes;
# - the container customization hook wrapper, required only for Kubernetes mode.

containerMode:
  type: kubernetes
  kubernetesModeWorkVolumeClaim:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi

template:
  spec:
    securityContext:
      # The official runner image uses runner UID/GID 1001. ARC Kubernetes mode
      # shares the work volume with workflow Pods, so keep the volume writable by
      # the runner group. Adjust this if you use a custom runner image.
      fsGroup: 1001
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command:
          - /home/runner/run.sh
        env:
          - name: ACTIONS_RUNNER_HOOK_JOB_STARTED
            value: /opt/cicd-sensor/job-hooks/github-k8s-job-started.js
          - name: CICD_SENSOR_GITHUB_K8S_RUNNER_SOCKET
            value: /run/cicd-sensor/github-k8s/runner.sock
          - name: ACTIONS_RUNNER_CONTAINER_HOOKS
            value: /opt/cicd-sensor/container-hooks/arc-hook-wrapper.js
          - name: CICD_SENSOR_K8S_NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
        volumeMounts:
          - name: cicd-sensor-github-arc-job-hook
            mountPath: /opt/cicd-sensor/job-hooks
            readOnly: true
          - name: cicd-sensor-github-k8s-runner-socket
            mountPath: /run/cicd-sensor/github-k8s
          - name: cicd-sensor-github-arc-kubernetes-mode-hook-wrapper
            mountPath: /opt/cicd-sensor/container-hooks
            readOnly: true
    volumes:
      - name: cicd-sensor-github-arc-job-hook
        configMap:
          name: cicd-sensor-github-arc-job-hook
          defaultMode: 0555
      - name: cicd-sensor-github-k8s-runner-socket
        hostPath:
          path: /run/cicd-sensor/github-k8s
          type: DirectoryOrCreate
      - name: cicd-sensor-github-arc-kubernetes-mode-hook-wrapper
        configMap:
          name: cicd-sensor-github-arc-kubernetes-mode-hook-wrapper
          defaultMode: 0555
