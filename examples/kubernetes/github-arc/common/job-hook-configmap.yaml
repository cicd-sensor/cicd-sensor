apiVersion: v1
kind: ConfigMap
metadata:
  name: cicd-sensor-github-arc-job-hook
  namespace: arc-runners
data:
  github-k8s-job-started.js: |
    #!/usr/bin/env node

    const http = require("http");

    const socketPath =
      process.env.CICD_SENSOR_GITHUB_K8S_RUNNER_SOCKET ||
      process.env.CICD_SENSOR_GITHUB_K8S_START_SOCKET ||
      "/run/cicd-sensor/github-k8s/runner.sock";
    const endpoint = process.env.CICD_SENSOR_GITHUB_K8S_START_ENDPOINT || "/v1/github/k8s/start";

    function providerHost() {
      const raw = process.env.GITHUB_SERVER_URL || "https://github.com";
      return raw.replace(/^https?:\/\//, "").replace(/\/.*$/, "").replace(/:\d+$/, "").replace(/\.$/, "").toLowerCase();
    }

    function body() {
      return {
        provider: "github",
        provider_host: providerHost(),
        project_path: process.env.GITHUB_REPOSITORY || "",
        github_run_id: process.env.GITHUB_RUN_ID || "",
        github_job: process.env.GITHUB_JOB || "",
        github_run_attempt: process.env.GITHUB_RUN_ATTEMPT || "",
        github_runner_tracking_id: process.env.RUNNER_TRACKING_ID || process.env.RUNNER_NAME || "",
        metadata: {
          commit_sha: process.env.GITHUB_SHA || "",
          ref_name: process.env.GITHUB_REF_NAME || process.env.GITHUB_REF || "",
          trigger: process.env.GITHUB_EVENT_NAME || "",
          actor_id: process.env.GITHUB_ACTOR_ID || "",
          actor_name: process.env.GITHUB_ACTOR || "",
          github_workflow_ref: process.env.GITHUB_WORKFLOW_REF || "",
          github_workflow_sha: process.env.GITHUB_WORKFLOW_SHA || "",
          github_workflow: process.env.GITHUB_WORKFLOW || "",
        },
      };
    }

    function requireFields(payload) {
      const required = [
        "provider_host",
        "project_path",
        "github_run_id",
        "github_job",
        "github_run_attempt",
        "github_runner_tracking_id",
      ];
      const missing = required.filter(key => !payload[key]);
      if (missing.length > 0) {
        throw new Error(`missing GitHub job identity fields: ${missing.join(", ")}`);
      }
    }

    function post(payload) {
      const data = JSON.stringify(payload);
      return new Promise((resolve, reject) => {
        const req = http.request({
          socketPath,
          path: endpoint,
          method: "POST",
          headers: {
            "content-type": "application/json",
            "content-length": Buffer.byteLength(data),
          },
        }, res => {
          let response = "";
          res.setEncoding("utf8");
          res.on("data", chunk => {
            response += chunk;
          });
          res.on("end", () => {
            if (res.statusCode >= 200 && res.statusCode < 300) {
              resolve();
              return;
            }
            reject(new Error(`agent returned ${res.statusCode}: ${response}`));
          });
        });
        req.on("error", reject);
        req.end(data);
      });
    }

    async function main() {
      const payload = body();
      requireFields(payload);
      await post(payload);
    }

    main().catch(err => {
      console.error(`cicd-sensor GitHub k8s job hook: ${err.stack || err.message}`);
      process.exit(1);
    });
