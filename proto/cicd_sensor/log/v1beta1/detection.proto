syntax = "proto3";

package cicd_sensor.log.v1beta1;

import "buf/validate/validate.proto";
import "cicd_sensor/log/v1beta1/common.proto";
import "google/protobuf/timestamp.proto";

message DetectionLogEntry {
  google.protobuf.Timestamp timestamp = 1 [json_name = "timestamp"];
  optional string log_type = 2 [json_name = "log_type"];
  optional string service_name = 3 [json_name = "service_name"];
  optional string service_version = 4 [json_name = "service_version"];
  optional string schema_version = 5 [json_name = "schema_version", (buf.validate.field).string.const = "v1"];
  // UUIDv7 for this detection log row.
  optional string log_id = 6 [json_name = "log_id"];
  LogContext job = 7 [json_name = "job"];
  optional string scope = 8 [json_name = "scope"];
  optional string runner_type = 9 [json_name = "runner_type"];
  optional string ruleset_id = 10 [json_name = "ruleset_id"];
  optional string rule_id = 11 [json_name = "rule_id"];
  optional string ruleset_revision = 12 [json_name = "ruleset_revision"];
  optional string rule_name = 13 [json_name = "rule_name"];
  optional string rule_description = 14 [json_name = "rule_description"];
  optional string action = 15 [json_name = "action"];
  optional string rule_alert_truncation = 16 [json_name = "rule_alert_truncation"];
  repeated string rule_tags = 17 [json_name = "rule_tags"];
  EventRecord event = 18 [json_name = "event"];
}
