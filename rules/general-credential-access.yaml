rule_sets:
  - ruleset_id: cicd_sensor_baseline/general_credential_access
    lists:
      supplychain_package_manager_suffixes:
        - "/npm"
        - "/pnpm"
        - "/yarn"
        - "/bun"
      supplychain_package_manager_argv_fragments:
        - "npm-cli.js"
        - "pnpm.cjs"
        - "yarn.js"
        - "install"
        - "ci"
        - "--foreground-scripts"
      supplychain_python_suffixes:
        - "/python"
        - "/python3"
        - "/pip"
        - "/pip3"
        - "/poetry"
      supplychain_action_tool_fragments:
        - "/_actions/"
        - "/actions-runner/"
      supplychain_aws_credential_suffixes:
        - "/.aws"
        - "/.aws/credentials"
        - "/.aws/config"
      supplychain_gcp_credential_suffixes:
        - "/.config/gcloud"
        - "/.config/gcloud/application_default_credentials.json"
        - "/.config/gcloud/credentials.db"
      supplychain_azure_credential_suffixes:
        - "/.azure"
        - "/.azure/accessTokens.json"
      supplychain_vault_credential_suffixes:
        - "/.vault-token"
        - "/run/secrets/vault_token"
      supplychain_npm_credential_suffixes:
        - "/.npmrc"
      supplychain_pypi_credential_suffixes:
        - "/.pypirc"
      supplychain_docker_credential_suffixes:
        - "/.docker"
        - "/.docker/config.json"
        - "/kaniko/.docker/config.json"
      supplychain_kubernetes_credential_suffixes:
        - "/.kube"
        - "/.kube/config"
        - "/var/run/secrets/kubernetes.io/serviceaccount/token"
      supplychain_github_credential_suffixes:
        - "/.config/gh"
        - "/.config/gh/hosts.yml"
      supplychain_git_credential_suffixes:
        - "/.git-credentials"
        - "/.netrc"
      supplychain_ssh_key_suffixes:
        - "/.ssh/id_rsa"
        - "/.ssh/id_ed25519"
        - "/.ssh/id_ecdsa"
        - "/.ssh/id_dsa"
      supplychain_gpg_key_suffixes:
        - "/.gnupg/secring.gpg"
        - "/.gnupg/private-keys-v1.d"
      supplychain_ai_devtool_fragments:
        - "/.claude"
        - "/.cursor"
        - "/.codex"
        - "/.config/codex"
        - "/.kiro"
        - "/.continue"
      supplychain_env_secret_suffixes:
        - "/.env"
      supplychain_shell_history_suffixes:
        - "/.bash_history"
        - "/.zsh_history"
        - "/.sh_history"
      supplychain_credential_suffixes:
        - "/.aws"
        - "/.aws/credentials"
        - "/.aws/config"
        - "/.config/gcloud"
        - "/.config/gcloud/application_default_credentials.json"
        - "/.config/gcloud/credentials.db"
        - "/.azure"
        - "/.azure/accessTokens.json"
        - "/.vault-token"
        - "/run/secrets/vault_token"
        - "/.npmrc"
        - "/.pypirc"
        - "/.docker"
        - "/.docker/config.json"
        - "/kaniko/.docker/config.json"
        - "/.kube"
        - "/.kube/config"
        - "/var/run/secrets/kubernetes.io/serviceaccount/token"
        - "/.config/gh"
        - "/.config/gh/hosts.yml"
        - "/.git-credentials"
        - "/.netrc"
        - "/.ssh/id_rsa"
        - "/.ssh/id_ed25519"
        - "/.ssh/id_ecdsa"
        - "/.ssh/id_dsa"
        - "/.gnupg/secring.gpg"
        - "/.gnupg/private-keys-v1.d"
        - "/.env"
        - "/.bash_history"
        - "/.zsh_history"
        - "/.sh_history"
      supplychain_credential_fragments:
        - "/.claude"
        - "/.cursor"
        - "/.codex"
        - "/.config/codex"
        - "/.kiro"
        - "/.continue"
    rules:
      - rule_id: supplychain_aws_credential_read
        rule_name: "Supply-chain: AWS credential surface read"
        description: |
          Detects reads or enumeration of AWS credential locations such as
          ~/.aws, ~/.aws/credentials, and ~/.aws/config. This is collected
          because supply-chain payloads often look for cloud credentials before
          exfiltration or lateral movement. Review the process lineage and
          confirm whether this process normally needs AWS credentials.
        event_type: file_open
        condition: is_read && list.supplychain_aws_credential_suffixes.exists(p, path.endsWith(p))
        action: collect
        tags:
          category: credential-access

      - rule_id: supplychain_gcp_credential_read
        rule_name: "Supply-chain: GCP credential surface read"
        description: |
          Detects reads or enumeration of Google Cloud SDK credential locations
          such as ~/.config/gcloud and application default credentials. This is
          collected because broad cloud credential discovery is common after a
          malicious package or developer tool runs. Check the ancestor process
          and verify whether GCP access is expected for this job.
        event_type: file_open
        condition: is_read && list.supplychain_gcp_credential_suffixes.exists(p, path.endsWith(p))
        action: collect
        tags:
          category: credential-access

      - rule_id: supplychain_azure_credential_read
        rule_name: "Supply-chain: Azure credential surface read"
        description: |
          Detects reads or enumeration of Azure CLI credential locations such
          as ~/.azure and accessTokens.json. This is collected because CI and
          developer environments may hold cloud tokens that can be reused by an
          attacker. Inspect the command ancestry and confirm the Azure CLI token
          cache should be accessed in this workflow.
        event_type: file_open
        condition: is_read && list.supplychain_azure_credential_suffixes.exists(p, path.endsWith(p))
        action: collect
        tags:
          category: credential-access

      - rule_id: supplychain_vault_credential_read
        rule_name: "Supply-chain: Vault credential surface read"
        description: |
          Detects reads of Vault token locations such as ~/.vault-token and
          /run/secrets/vault_token. This is collected because secret-manager
          tokens can unlock additional credentials after initial code execution.
          Review whether the process normally interacts with Vault and rotate
          exposed tokens if the access is unexpected.
        event_type: file_open
        condition: is_read && list.supplychain_vault_credential_suffixes.exists(p, path.endsWith(p))
        action: collect
        tags:
          category: credential-access

      - rule_id: supplychain_npm_credential_read
        rule_name: "Supply-chain: npm credential surface read"
        description: |
          Detects reads of .npmrc files that may contain npm registry tokens.
          This is collected because stolen npm tokens are frequently used to
          publish follow-on malicious package versions. Check whether the
          process is a legitimate package manager operation or an unexpected
          descendant of install-time code.
        event_type: file_open
        condition: is_read && list.supplychain_npm_credential_suffixes.exists(p, path.endsWith(p))
        action: collect
        tags:
          category: credential-access

      - rule_id: supplychain_pypi_credential_read
        rule_name: "Supply-chain: PyPI credential surface read"
        description: |
          Detects reads of .pypirc files that may contain Python package
          registry credentials. This is collected because compromised publisher
          tokens can turn a local package execution into registry propagation.
          Confirm whether this job should publish Python packages and review
          nearby process and network activity.
        event_type: file_open
        condition: is_read && list.supplychain_pypi_credential_suffixes.exists(p, path.endsWith(p))
        action: collect
        tags:
          category: credential-access

      - rule_id: supplychain_docker_credential_read
        rule_name: "Supply-chain: Docker credential surface read"
        description: |
          Detects reads or enumeration of Docker registry credential locations
          such as ~/.docker and config.json. This is collected because registry
          credentials can be used to pull private images or publish malicious
          images. Review the process lineage and whether image registry access
          is expected at this point in the job.
        event_type: file_open
        condition: is_read && list.supplychain_docker_credential_suffixes.exists(p, path.endsWith(p))
        action: collect
        tags:
          category: credential-access

      - rule_id: supplychain_kubernetes_credential_read
        rule_name: "Supply-chain: Kubernetes credential surface read"
        description: |
          Detects reads or enumeration of Kubernetes access material such as
          ~/.kube, kubeconfig, and service account tokens. This is collected
          because these files can allow cluster discovery or lateral movement.
          Check whether the process should access Kubernetes and investigate
          any package, Python, or action ancestry.
        event_type: file_open
        condition: is_read && list.supplychain_kubernetes_credential_suffixes.exists(p, path.endsWith(p))
        action: collect
        tags:
          category: credential-access

      - rule_id: supplychain_github_credential_read
        rule_name: "Supply-chain: GitHub credential surface read"
        description: |
          Detects reads or enumeration of GitHub CLI credential locations such
          as ~/.config/gh and hosts.yml. This is collected because GitHub tokens
          can be used for repository exfiltration, workflow mutation, or package
          propagation. Review the process lineage and audit GitHub API activity
          if the access is unexpected.
        event_type: file_open
        condition: is_read && list.supplychain_github_credential_suffixes.exists(p, path.endsWith(p))
        action: collect
        tags:
          category: credential-access

      - rule_id: supplychain_git_credential_read
        rule_name: "Supply-chain: Git credential surface read"
        description: |
          Detects reads of Git HTTPS credential files such as .git-credentials
          and .netrc. This is collected because these credentials can provide
          repository access outside the current checkout. Confirm the process is
          a legitimate Git client and inspect whether credentials were followed
          by network or repository operations.
        event_type: file_open
        condition: is_read && list.supplychain_git_credential_suffixes.exists(p, path.endsWith(p))
        action: collect
        tags:
          category: credential-access

      - rule_id: supplychain_ssh_key_read
        rule_name: "Supply-chain: SSH private key read"
        description: |
          Detects reads of common SSH private key files. This is collected
          because private keys can provide repository, server, or deployment
          access after a compromised package or tool runs. Review whether the
          process should use SSH and rotate keys if access came from unexpected
          install-time or import-time code.
        event_type: file_open
        condition: is_read && list.supplychain_ssh_key_suffixes.exists(p, path.endsWith(p))
        action: collect
        tags:
          category: credential-access

      - rule_id: supplychain_gpg_key_read
        rule_name: "Supply-chain: GPG key surface read"
        description: |
          Detects reads of GPG secret keyring locations. This is collected
          because signing material may be targeted to forge releases or decrypt
          protected data. Check whether the job normally signs artifacts and
          verify the process ancestry before trusting the resulting build.
        event_type: file_open
        condition: is_read && list.supplychain_gpg_key_suffixes.exists(p, path.endsWith(p))
        action: collect
        tags:
          category: credential-access

      - rule_id: supplychain_ai_devtool_surface_read
        rule_name: "Supply-chain: AI developer-tool surface read"
        description: |
          Detects reads or enumeration of AI and developer-tool configuration
          surfaces such as Claude, Cursor, Codex, Kiro, and Continue settings.
          This is collected because recent supply-chain payloads target editor
          and agent configuration for credentials and persistence. Review the
          process lineage and inspect these files for unexpected modifications.
        event_type: file_open
        condition: is_read && list.supplychain_ai_devtool_fragments.exists(p, path.contains(p))
        action: collect
        tags:
          category: credential-access

      - rule_id: supplychain_env_secret_read
        rule_name: "Supply-chain: env secret file read"
        description: |
          Detects reads of .env files. This is collected because application
          environment files often hold API keys and service credentials that are
          useful to supply-chain payloads. Confirm whether the process normally
          reads project secrets and investigate any unexpected package or tool
          ancestry.
        event_type: file_open
        condition: is_read && list.supplychain_env_secret_suffixes.exists(p, path.endsWith(p))
        action: collect
        tags:
          category: credential-access

      - rule_id: supplychain_shell_history_read
        rule_name: "Supply-chain: shell history read"
        description: |
          Detects reads of shell history files. This is collected because shell
          history can contain pasted tokens, one-off deployment commands, and
          secret-bearing CLI usage. Review whether the process should inspect a
          user's shell history and treat unexpected access as credential
          discovery.
        event_type: file_open
        condition: is_read && list.supplychain_shell_history_suffixes.exists(p, path.endsWith(p))
        action: collect
        tags:
          category: credential-access

      - rule_id: supplychain_proc_environ_read
        rule_name: "Supply-chain: process environment read"
        description: |
          Detects reads of /proc/<pid>/environ. This is collected because CI
          secrets and short-lived tokens are commonly exposed through process
          environments. Review the target process, determine whether the reader
          needed those environment variables, and rotate exposed credentials if
          the access was unexpected.
        event_type: file_open
        condition: is_read && path.contains("/proc/") && path.endsWith("/environ")
        action: collect
        tags:
          category: credential-access

      - rule_id: supplychain_anchored_credential_read
        rule_name: "Supply-chain: credential read under package, Python, or action ancestry"
        description: |
          Collects sensitive credential reads when the process lineage points
          back to package install, Python startup/import, or action execution
          paths. This is collected because credential access is more suspicious
          when it happens as a side effect of dependency installation or dynamic
          developer tooling. Review the matched ancestor and decide whether the
          package, import, or action should have accessed that credential family.
        event_type: file_open
        condition: |
          is_read &&
          (
            list.supplychain_credential_suffixes.exists(p, path.endsWith(p)) ||
            list.supplychain_credential_fragments.exists(p, path.contains(p)) ||
            (path.contains("/proc/") && path.endsWith("/environ"))
          ) &&
          process.ancestors.exists(a,
            (
              list.supplychain_package_manager_suffixes.exists(p, a.exec_path.endsWith(p)) &&
              a.argv.exists(arg, arg == "install" || arg == "ci")
            ) ||
            (
              a.exec_path.endsWith("/node") &&
              a.argv.exists(arg, list.supplychain_package_manager_argv_fragments.exists(p, arg.contains(p)))
            ) ||
            list.supplychain_python_suffixes.exists(p, a.exec_path.endsWith(p)) ||
            list.supplychain_action_tool_fragments.exists(p, a.exec_path.contains(p))
          )
        action: collect
        tags:
          category: credential-access

      - rule_id: supplychain_proc_maps_read
        rule_name: "Supply-chain: process memory map read"
        description: |
          Detects reads of /proc/<pid>/maps. This is collected because memory
          scraping often reads maps first to locate readable process regions,
          but maps alone can occur during normal runtime startup. Use this
          primitive with the maps-and-mem correlation and inspect the reader if
          /proc/<pid>/mem is also accessed.
        event_type: file_open
        condition: is_read && path.contains("/proc/") && path.endsWith("/maps")
        action: collect
        max_alerts: 1
        tags:
          category: credential-access

      - rule_id: supplychain_proc_mem_read
        rule_name: "Supply-chain: process memory read"
        description: |
          Detects reads of /proc/<pid>/mem. This is collected because direct
          process memory access can expose CI secrets, tokens, and runtime
          credentials. Review the reader and target process immediately, and
          treat access combined with /proc/<pid>/maps as likely memory scraping.
        event_type: file_open
        condition: is_read && path.contains("/proc/") && path.endsWith("/mem")
        action: collect
        max_alerts: 1
        tags:
          category: credential-access

      - rule_id: supplychain_multi_family_credential_access
        rule_name: "Supply-chain: credential surface enumeration"
        description: |
          Detects a job that touches five or more distinct credential surface
          families, even without a specific package or action anchor. This is
          detected because broad cross-family credential enumeration is unusual
          for normal tooling and matches credential-harvesting payload behavior.
          Review the collected family hits, identify the common process lineage,
          and rotate credentials that were exposed.
        type: correlation
        condition: |
          (
            (rule.supplychain_aws_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_gcp_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_azure_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_vault_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_npm_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_pypi_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_docker_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_kubernetes_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_github_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_git_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_ssh_key_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_gpg_key_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_ai_devtool_surface_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_env_secret_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_shell_history_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_proc_environ_read.total_count >= 1 ? 1 : 0)
          ) >= 5
        action: detect
        tags:
          category: credential-access

      - rule_id: supplychain_anchored_multi_family_credential_access
        rule_name: "Supply-chain: anchored credential surface enumeration"
        description: |
          Detects credential enumeration across three or more families when at
          least one sensitive read happened below package install, Python
          startup/import, or action execution paths. This is detected because
          supply-chain payloads often run through those entry points before
          sweeping available credentials. Review the anchor process, package or
          action source, and any subsequent egress or API activity.
        type: correlation
        condition: |
          rule.supplychain_anchored_credential_read.total_count >= 1 &&
          (
            (rule.supplychain_aws_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_gcp_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_azure_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_vault_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_npm_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_pypi_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_docker_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_kubernetes_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_github_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_git_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_ssh_key_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_gpg_key_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_ai_devtool_surface_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_env_secret_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_shell_history_read.total_count >= 1 ? 1 : 0) +
            (rule.supplychain_proc_environ_read.total_count >= 1 ? 1 : 0)
          ) >= 3
        action: detect
        tags:
          category: credential-access

      - rule_id: supplychain_proc_maps_mem_combo
        rule_name: "Supply-chain: process maps and memory read"
        description: |
          Detects jobs that read both /proc/<pid>/maps and /proc/<pid>/mem.
          This is detected because maps can be used to find readable process
          regions before dumping memory for CI secrets, a pattern seen in
          supply-chain credential theft. Review the reader process, identify the
          target process, and rotate any credentials that may have been resident
          in memory.
        type: correlation
        condition: |
          rule.supplychain_proc_maps_read.total_count >= 1 &&
          rule.supplychain_proc_mem_read.total_count >= 1
        action: detect
        tags:
          category: credential-access
