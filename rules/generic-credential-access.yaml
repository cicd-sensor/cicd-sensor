# Generic credential-access baseline
#
# This ruleset intentionally separates raw credential-access signals from
# detect-level correlation:
#
# 1. Credential-family reads are collected as raw signals.
#    A tool may legitimately read one credential surface during normal CI work,
#    and repository scanners such as Syft, SBOM generators, or secret-scanning
#    tools may walk the whole repository and touch credential-looking paths.
#    Those reads are useful context, but they are too noisy to detect on by
#    themselves.
#
# 2. Detection requires raw signals mixed with package-install ancestry.
#    The detect-level correlation below fires only when multiple credential
#    families are touched and at least one explicit credential-store read
#    occurred below a Node or Python package installation lineage. This is what
#    prevents broad file-scanning tools from becoming detections while still
#    preserving the supply-chain case we care about: install-time code, or its
#    children, sweeping credentials.
#
# TODO: Add a separate baseline path for compromised GitHub Actions or action
# runtime/tooling after investigation. Action ancestry is intentionally not used
# as a detection anchor here yet because normal actions can also perform broad
# repository scans.
#
# Keep short one-off suffix checks inline in rule conditions. Use lists only
# when the list is long enough to improve readability or when multiple rules
# share the same list, such as credential_suffixes.
rule_sets:
  - ruleset_id: cicd_sensor_baseline/generic_credential_access
    lists:
      ssh_key_suffixes:
        - "/.ssh/id_rsa"
        - "/.ssh/id_ed25519"
        - "/.ssh/id_ecdsa"
        - "/.ssh/id_dsa"

      ai_devtool_fragments:
        - "/.claude"
        - "/.cursor"
        - "/.codex"
        - "/.config/codex"
        - "/.kiro"
        - "/.continue"

      shell_history_suffixes:
        - "/.bash_history"
        - "/.zsh_history"
        - "/.sh_history"

      credential_suffixes:
        - "/.aws"
        - "/.aws/credentials"
        - "/.aws/config"
        - "/.config/gcloud"
        - "/.config/gcloud/application_default_credentials.json"
        - "/.config/gcloud/credentials.db"
        - "/.azure"
        - "/.azure/accessTokens.json"
        - "/.vault-token"
        - "/vault_token"
        - "/.docker"
        - "/.docker/config.json"
        - "/.kube"
        - "/.kube/config"
        - "/serviceaccount/token"
        - "/.config/gh"
        - "/.config/gh/hosts.yml"
        - "/.git-credentials"
        - "/.netrc"
        - "/.ssh/id_rsa"
        - "/.ssh/id_ed25519"
        - "/.ssh/id_ecdsa"
        - "/.ssh/id_dsa"
        - "/.gnupg/secring.gpg"
        - "/.gnupg/private-keys-v1.d"

    rules:
      - rule_id: github_cli_token_exposure
        rule_name: "Supply-chain: GitHub CLI token exposure"
        description: |
          What:
            Collects commands that print a GitHub CLI token, such as gh auth token or gh auth status --show-token.
          Why:
            GitHub tokens are commonly used for repository exfiltration, workflow mutation, and propagation.
          Notes:
            Review process lineage, audit GitHub API activity, and rotate the token if this was not an approved release or diagnostic step.
        event_type: process_exec
        condition: |
          process.exec_path.endsWith("/gh") &&
          process.argv.exists(arg, arg == "auth") &&
          (
            process.argv.exists(arg, arg == "token") ||
            process.argv.exists(arg, arg == "--show-token")
          )
        action: collect
        tags:
          mitre_tactic: credential-access

      - rule_id: aws_credential_read
        rule_name: "Supply-chain: AWS credential surface read"
        description: |
          What:
            Collects reads or enumeration of AWS credential locations such as ~/.aws, ~/.aws/credentials, and ~/.aws/config.
          Why:
            Cloud credentials are common supply-chain harvest targets.
          Notes:
            Confirm whether this process normally needs AWS credentials.
        event_type: file_open
        condition: is_read && (path.endsWith("/.aws") || path.endsWith("/.aws/credentials") || path.endsWith("/.aws/config"))
        action: collect
        tags:
          mitre_tactic: credential-access

      - rule_id: gcp_credential_read
        rule_name: "Supply-chain: GCP credential surface read"
        description: |
          What:
            Collects reads or enumeration of Google Cloud SDK credential locations such as ~/.config/gcloud and ADC files.
          Why:
            Broad cloud credential discovery is common after malicious package or developer-tool execution.
          Notes:
            Check the ancestor process and verify whether GCP access is expected for this job.
        event_type: file_open
        condition: |
          is_read &&
          (
            path.endsWith("/.config/gcloud") ||
            path.endsWith("/.config/gcloud/application_default_credentials.json") ||
            path.endsWith("/.config/gcloud/credentials.db")
          )
        action: collect
        tags:
          mitre_tactic: credential-access

      - rule_id: azure_credential_read
        rule_name: "Supply-chain: Azure credential surface read"
        description: |
          What:
            Collects reads or enumeration of Azure CLI credential locations such as ~/.azure and accessTokens.json.
          Why:
            CI and developer environments may hold reusable cloud tokens.
          Notes:
            Inspect ancestry and confirm Azure token cache access is expected in this workflow.
        event_type: file_open
        condition: is_read && (path.endsWith("/.azure") || path.endsWith("/.azure/accessTokens.json"))
        action: collect
        tags:
          mitre_tactic: credential-access

      - rule_id: vault_credential_read
        rule_name: "Supply-chain: Vault credential surface read"
        description: |
          What:
            Collects reads of Vault token locations such as ~/.vault-token and files named vault_token.
          Why:
            Secret-manager tokens can unlock additional credentials.
          Notes:
            Verify whether the process normally uses Vault and rotate exposed tokens if access is unexpected.
        event_type: file_open
        condition: is_read && (path.endsWith("/.vault-token") || path.endsWith("/vault_token"))
        action: collect
        tags:
          mitre_tactic: credential-access

      - rule_id: docker_credential_read
        rule_name: "Supply-chain: Docker credential surface read"
        description: |
          What:
            Collects reads or enumeration of Docker registry credential locations such as ~/.docker and config.json.
          Why:
            Registry credentials can pull private images or publish malicious images.
          Notes:
            Review lineage and whether image registry access is expected at this point in the job.
        event_type: file_open
        condition: is_read && (path.endsWith("/.docker") || path.endsWith("/.docker/config.json"))
        action: collect
        tags:
          mitre_tactic: credential-access

      - rule_id: kubernetes_credential_read
        rule_name: "Supply-chain: Kubernetes credential surface read"
        description: |
          What:
            Collects reads or enumeration of Kubernetes access material such as ~/.kube, kubeconfig, and service account tokens.
          Why:
            These credentials can allow cluster discovery or lateral movement.
          Notes:
            Check whether the process should access Kubernetes and inspect whether access came from package installation ancestry.
        event_type: file_open
        condition: is_read && (path.endsWith("/.kube") || path.endsWith("/.kube/config") || path.endsWith("/serviceaccount/token"))
        action: collect
        tags:
          mitre_tactic: credential-access

      - rule_id: github_credential_read
        rule_name: "Supply-chain: GitHub credential surface read"
        description: |
          What:
            Collects reads or enumeration of GitHub CLI credential locations such as ~/.config/gh and hosts.yml.
          Why:
            GitHub tokens can enable repository exfiltration, workflow mutation, and package propagation.
          Notes:
            Review process lineage and audit GitHub API activity if access is unexpected.
        event_type: file_open
        condition: is_read && (path.endsWith("/.config/gh") || path.endsWith("/.config/gh/hosts.yml"))
        action: collect
        tags:
          mitre_tactic: credential-access

      - rule_id: git_credential_read
        rule_name: "Supply-chain: Git credential surface read"
        description: |
          What:
            Collects reads of Git HTTPS credential files such as .git-credentials and .netrc.
          Why:
            These credentials can provide repository access outside the current checkout.
          Notes:
            Confirm the process is a legitimate Git client and inspect later network or repository operations.
        event_type: file_open
        condition: is_read && (path.endsWith("/.git-credentials") || path.endsWith("/.netrc"))
        action: collect
        tags:
          mitre_tactic: credential-access

      - rule_id: ssh_key_read
        rule_name: "Supply-chain: SSH private key read"
        description: |
          What:
            Collects reads of common SSH private key files.
          Why:
            Private keys can provide repository, server, or deployment access after compromised package or tool execution.
          Notes:
            Review whether the process should use SSH and rotate keys if access came from unexpected install-time or import-time code.
        event_type: file_open
        condition: is_read && list.ssh_key_suffixes.exists(p, path.endsWith(p))
        action: collect
        tags:
          mitre_tactic: credential-access

      - rule_id: gpg_key_read
        rule_name: "Supply-chain: GPG key surface read"
        description: |
          What:
            Collects reads of GPG secret keyring locations.
          Why:
            Signing material may be used to forge releases or decrypt protected data.
          Notes:
            Check whether the job normally signs artifacts and verify process ancestry before trusting the resulting build.
        event_type: file_open
        condition: is_read && (path.endsWith("/.gnupg/secring.gpg") || path.endsWith("/.gnupg/private-keys-v1.d"))
        action: collect
        tags:
          mitre_tactic: credential-access

      - rule_id: ai_devtool_surface_read
        rule_name: "Supply-chain: AI developer-tool surface read"
        description: |
          What:
            Collects reads or enumeration of AI and developer-tool configuration surfaces such as Claude, Cursor, Codex, Kiro, and Continue settings.
          Why:
            Recent supply-chain payloads target editor and agent configuration for credentials and persistence.
          Notes:
            Review process lineage and inspect these files for unexpected modifications.
        event_type: file_open
        condition: is_read && list.ai_devtool_fragments.exists(p, path.contains(p))
        action: collect
        tags:
          mitre_tactic: credential-access

      - rule_id: env_secret_read
        rule_name: "Supply-chain: env secret file read"
        description: |
          What:
            Collects reads of .env files.
          Why:
            Application environment files often hold API keys and service credentials useful to supply-chain payloads.
          Notes:
            Confirm whether the process normally reads project secrets and inspect unexpected package or tool ancestry.
        event_type: file_open
        condition: is_read && path.endsWith("/.env")
        action: collect
        tags:
          mitre_tactic: credential-access

      - rule_id: proc_environ_read
        rule_name: "Supply-chain: process environment read"
        description: |
          What:
            Collects reads of /proc/<pid>/environ.
          Why:
            CI secrets and short-lived tokens are commonly exposed through process environments.
          Notes:
            Review the reader and target process, then rotate exposed credentials if access was unexpected.
        event_type: file_open
        condition: is_read && path.contains("/proc/") && path.endsWith("/environ")
        action: collect
        tags:
          mitre_tactic: credential-access

      - rule_id: shell_history_read
        rule_name: "Supply-chain: shell history read"
        description: |
          What:
            Collects reads of shell history files.
          Why:
            CI jobs rarely need interactive shell history, and history can contain pasted tokens or secret-bearing CLI usage.
          Notes:
            Treat unexpected shell history access as credential discovery.
        event_type: file_open
        condition: is_read && list.shell_history_suffixes.exists(p, path.endsWith(p))
        action: collect
        tags:
          mitre_tactic: credential-access

      - rule_id: node_package_manager_install_credential_read
        rule_name: "Supply-chain: credential read under Node package manager install ancestry"
        description: |
          What:
            Collects explicit credential store reads below npm, pnpm, yarn, or bun installation ancestry.
          Why:
            Reads of known credential stores are more suspicious when they are a side effect of dependency installation.
          Notes:
            Review the matched Node package manager ancestor and decide whether that install step should access the credential family.
        event_type: file_open
        condition: |
          is_read &&
          list.credential_suffixes.exists(p, path.endsWith(p)) &&
          process.ancestors.exists(a,
            (
              a.exec_path.endsWith("/npm") ||
              a.exec_path.endsWith("/pnpm") ||
              a.exec_path.endsWith("/yarn") ||
              a.exec_path.endsWith("/bun")
            ) &&
            a.argv.exists(arg, arg == "install" || arg == "ci" || arg == "add")
          )
        action: collect
        tags:
          mitre_tactic: credential-access

      - rule_id: node_package_cli_install_credential_read
        rule_name: "Supply-chain: credential read under Node package CLI install ancestry"
        description: |
          What:
            Collects explicit credential store reads below node-based npm, pnpm, or yarn CLI installation ancestry.
          Why:
            Reads of known credential stores are more suspicious when they are a side effect of dependency installation.
          Notes:
            Review the matched Node package CLI ancestor and decide whether that install step should access the credential family.
        event_type: file_open
        condition: |
          is_read &&
          list.credential_suffixes.exists(p, path.endsWith(p)) &&
          process.ancestors.exists(a,
            a.exec_path.endsWith("/node") &&
            a.argv.exists(arg,
              arg.contains("npm-cli.js") ||
              arg.contains("pnpm.cjs") ||
              arg.contains("yarn.js")
            ) &&
            a.argv.exists(arg, arg == "install" || arg == "ci" || arg == "add")
          )
        action: collect
        tags:
          mitre_tactic: credential-access

      - rule_id: python_package_install_credential_read
        rule_name: "Supply-chain: credential read under Python package install ancestry"
        description: |
          What:
            Collects explicit credential store reads below Python package installation ancestry.
          Why:
            Reads of known credential stores are more suspicious when they are a side effect of dependency installation.
          Notes:
            Review the matched Python package manager ancestor and decide whether that install step should access the credential family.
        event_type: file_open
        condition: |
          is_read &&
          list.credential_suffixes.exists(p, path.endsWith(p)) &&
          process.ancestors.exists(a,
            (
              (
                a.exec_path.endsWith("/pip") ||
                a.exec_path.endsWith("/pip3") ||
                a.exec_path.endsWith("/poetry")
              ) &&
              a.argv.exists(arg, arg == "install" || arg == "add")
            ) ||
            (
              (
                a.exec_path.endsWith("/python") ||
                a.exec_path.endsWith("/python3")
              ) &&
              a.argv.exists(arg, arg == "-m") &&
              a.argv.exists(arg, arg == "pip" || arg == "poetry") &&
              a.argv.exists(arg, arg == "install" || arg == "add")
            )
          )
        action: collect
        tags:
          mitre_tactic: credential-access

      - rule_id: proc_mem_read
        rule_name: "Supply-chain: process memory read"
        description: |
          What:
            Collects reads of /proc/<pid>/mem.
          Why:
            Direct process memory access can expose CI secrets, tokens, and runtime credentials.
          Notes:
            Treat unexpected process memory access as credential exposure or memory scraping.
        event_type: file_open
        condition: is_read && path.contains("/proc/") && path.endsWith("/mem")
        action: collect
        max_alerts: 1
        tags:
          mitre_tactic: credential-access

      - rule_id: anchored_multi_family_credential_access
        rule_name: "Supply-chain: anchored credential surface enumeration"
        description: |
          What:
            Detects three or more distinct credential families from the same family set when at least one credential read happened below Node or Python package installation ancestry.
          Why:
            Supply-chain payloads often run through dependency installation before sweeping available credentials.
          Notes:
            Review the anchor process, source package, and subsequent egress or API activity.
        type: correlation
        condition: |
          (
            rule.node_package_manager_install_credential_read.total_count >= 1 ||
            rule.node_package_cli_install_credential_read.total_count >= 1 ||
            rule.python_package_install_credential_read.total_count >= 1
          ) &&
          (
            (rule.aws_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.gcp_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.azure_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.vault_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.docker_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.kubernetes_credential_read.total_count >= 1 ? 1 : 0) +
            (
              (
                rule.github_credential_read.total_count >= 1 ||
                rule.github_cli_token_exposure.total_count >= 1
              ) ? 1 : 0
            ) +
            (rule.git_credential_read.total_count >= 1 ? 1 : 0) +
            (rule.ssh_key_read.total_count >= 1 ? 1 : 0) +
            (rule.gpg_key_read.total_count >= 1 ? 1 : 0) +
            (rule.ai_devtool_surface_read.total_count >= 1 ? 1 : 0) +
            (rule.env_secret_read.total_count >= 1 ? 1 : 0) +
            (rule.shell_history_read.total_count >= 1 ? 1 : 0) +
            (rule.proc_environ_read.total_count >= 1 ? 1 : 0) +
            (rule.proc_mem_read.total_count >= 1 ? 1 : 0)
          ) >= 3
        action: detect
        tags:
          mitre_tactic: credential-access
