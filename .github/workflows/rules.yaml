---
name: Rules

"on":
  pull_request:
    paths:
      - rules/**
      - .github/workflows/rules.yaml
  push:
    branches:
      - main
    paths:
      - rules/**
      - .github/workflows/rules.yaml

permissions:
  contents: read

concurrency:
  group: rules-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Validate rules
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Validate rules
        run: make rules-validate
      - name: Validate bundled rules
        run: make rules-bundle-validate
