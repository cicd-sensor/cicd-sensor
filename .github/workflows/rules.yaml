---
name: Rules

"on":
  pull_request:
    paths:
      - rules/**
      - .github/workflows/rules.yaml
  push:
    branches:
      - main
    paths:
      - rules/**
      - .github/workflows/rules.yaml

permissions:
  contents: read

concurrency:
  group: rules-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Validate rules
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Validate rules
        run: make rules-validate
      - name: Validate bundled rules
        run: make rules-bundle-validate
