---
name: Blacksmith BPF Integration

"on":
  workflow_dispatch:
  # Let release-sensor reuse this as a Blacksmith runner compatibility gate.
  workflow_call:

permissions:
  contents: read

concurrency:
  group: blacksmith-bpf-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bpf-integration:
    name: BPF integration
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 20
    env:
      GOCACHE: ${{ github.workspace }}/.gocache
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install BPF integration deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dnsutils libnss-resolve

      - name: Environment info
        run: |
          {
            echo "## Blacksmith environment"
            echo '```'
            uname -a
            cat /etc/os-release
            go version
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Run BPF integration tests
        run: |
          make bpf-integration SUDO=sudo
