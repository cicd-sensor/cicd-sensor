name: trigger-docs-deploy

on:
  push:
    branches: [main]
    paths:
      - "docs/**"

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-24.04
    environment: docs-releases
    steps:
      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.DOCS_DEPLOY_CLIENT_ID }}
          private-key: ${{ secrets.DOCS_DEPLOY_APP_PRIVATE_KEY }}
          owner: cicd-sensor
          repositories: cicd-sensor.github.io

      - name: Trigger docs deploy
        run: |
          gh api \
            -X POST \
            repos/cicd-sensor/cicd-sensor.github.io/dispatches \
            -f event_type=cicd-sensor-docs-updated
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
