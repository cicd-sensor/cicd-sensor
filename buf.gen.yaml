version: v2
managed:
  enabled: true
  disable:
    - module: buf.build/bufbuild/protovalidate
  override:
    - file_option: go_package_prefix
      value: github.com/cicd-sensor/cicd-sensor/internal/proto
plugins:
  - local: protoc-gen-go
    out: internal/proto
    opt: paths=source_relative
  - local: protoc-gen-connect-go
    out: internal/proto
    opt: paths=source_relative
